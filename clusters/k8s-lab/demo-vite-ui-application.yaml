apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-vite-ui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    # Manifests for this app live in the k8s-lab gitops repo.
    # Update repoURL to your fork if needed.
    repoURL: https://github.com/rayabueg/gitops-lab.git
    targetRevision: main
    path: clusters/k8s-lab/gateway
    kustomize:
      # Patch the image tag here for image promotion.
      # CI updates this value via PR when a new image is built.
      images:
        - ghcr.io/rayabueg/demo-vite-ui:latest
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
