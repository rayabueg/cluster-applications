name: Validate manifests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  yaml-lint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint apps/
        run: yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' apps/

  schema-validate:
    name: kubeconform (ApplicationSet CRDs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSfL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Validate ApplicationSet schemas
        # Uses the upstream ArgoCD CRD schema catalog
        run: |
          kubeconform \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            apps/
