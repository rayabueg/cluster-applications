apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-applications-k8s-lab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    # TODO: replace with your fork URL
    repoURL: https://github.com/rayabueg/cluster-applications.git
    targetRevision: main
    path: clusters/k8s-lab
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
